apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: brain-factory
  description: >
    DoPeJarMo architecture authority — design specs, Sawmill build pipeline,
    D1-D10 templates, agent roles. Source of truth for all framework specs.
  annotations:
    github.com/project-slug: rabruni/Brain_Factory
    dopejarmo.dev/staging-path: staging/
    dopejarmo.dev/sdk-local-path: /Users/raymondbruni/dopejar/platform_sdk
    dopejarmo.dev/runtime-local-path: /Users/raymondbruni/dopejar
  tags:
    - architecture
    - dopejarmo
    - sawmill
  links:
    - url: https://github.com/rabruni/Brain_Factory
      title: GitHub
      icon: github
spec:
  type: library
  owner: user:ray-bruni
  lifecycle: production
  system: dopejarmo
  providesApis:
    - portal-mcp-api
  dependsOn:
    - component:platform-sdk
    - component:kernel

---
# ── Portal MCP API ────────────────────────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: portal-mcp-api
  description: >
    MCP server exposing pipeline runs, agent conversations, file browsing,
    system catalog, and git activity as tools for AI agents. Config-driven
    so it can be replicated on any agentic system.
  tags:
    - mcp
    - portal
    - observability
    - dopejarmo
spec:
  type: mcp
  owner: user:ray-bruni
  lifecycle: production
  system: dopejarmo
  definition:
    $text: ../dopejar/apis/portal-mcp.yaml
