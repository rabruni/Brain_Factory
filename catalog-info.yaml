apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: brain-factory
  description: >
    DoPeJarMo architecture authority, Sawmill build pipeline, agent workspace,
    and observability portal. Houses design specs, D1-D10 templates, agent roles,
    and the shared workspace for cross-agent communication.
  annotations:
    github.com/project-slug: rabruni/Brain_Factory
    dopejarmo.dev/staging-path: staging/
    dopejarmo.dev/sdk-local-path: /Users/raymondbruni/dopejar/platform_sdk
    dopejarmo.dev/runtime-local-path: /Users/raymondbruni/dopejar
  tags:
    - architecture
    - dopejarmo
    - sawmill
    - portal
    - workspace
  links:
    - url: https://github.com/rabruni/Brain_Factory
      title: GitHub
      icon: github
    - url: https://portal.dopejarmo.com
      title: Portal (Streamlit)
    - url: https://mcp.dopejarmo.com
      title: MCP Server (HTTP)
spec:
  type: library
  owner: user:ray-bruni
  lifecycle: production
  system: dopejarmo
  providesApis:
    - portal-mcp-api
  dependsOn:
    - component:platform-sdk
    - component:kernel

---
# ── Portal MCP API ────────────────────────────────────────────────────────────
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: portal-mcp-api
  description: >
    MCP server exposing pipeline runs, agent conversations, workspace operations,
    file browsing, system catalog, and git activity as tools for AI agents.
    19 tools including workspace CRUD, agent onboarding, and heartbeat.
    Config-driven so it can be replicated on any agentic system.
  tags:
    - mcp
    - portal
    - workspace
    - observability
    - dopejarmo
spec:
  type: mcp
  owner: user:ray-bruni
  lifecycle: production
  system: dopejarmo
  definition:
    $text: ../dopejar/apis/portal-mcp.yaml
