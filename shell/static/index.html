<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DoPeJarMo Chat</title>
<link rel="stylesheet" href="/static/style.css">

</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>DoPeJarMo</h1>
      <button class="btn-new" onclick="showNewThread()">+ New</button>
    </div>
    <div class="fwk-selector-wrap">
      <select id="fwk-select" class="fwk-select" onchange="changeFwk(this.value)"></select>
      <div id="fwk-description" class="fwk-description"></div>
    </div>
    <div id="thread-list" class="thread-list">
      <div id="blueprints-section"></div>
      <div id="sawmill-section"></div>
      <div id="factory-section"></div>
      <div id="general-agents-section"></div>
      <div id="scratchpad-section"></div>
      <div id="brain-section"></div>
    </div>
    <div class="conn-status">
      <span id="conn-dot" class="conn-dot connecting"></span>
      <span id="conn-text" style="color:var(--text-muted)">Connecting...</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="top-strip" class="top-strip" style="display:none"></div>
    <div id="chat-header" class="chat-header" style="display:none">
      <div>
        <div id="chat-title" class="chat-title"></div>
        <div id="chat-participants" class="chat-participants"></div>
      </div>
    </div>
    <div id="messages" class="messages">
      <div class="empty-state">
        <div>
          <p>Select a conversation or start a new one</p>
          <div class="hint">Messages appear in real-time via WebSocket</div>
        </div>
      </div>
    </div>
    <div id="input-bar" class="input-bar" style="display:none">
      <div class="input-row">
        <div class="input-wrapper">
          <div id="talking-to" class="talking-to" onclick="toggleRoutePicker()"></div>
          <div class="input-controls">
            <div id="route-picker-wrap" class="route-picker-wrap" style="display:none">
              <select id="route-select" class="route-select" onchange="handleRouteChange(this.value)"></select>
            </div>
            <input type="hidden" id="type-select" value="prompt">
          </div>
          <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
        </div>
        <button id="btn-send" class="btn-send" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- New Thread Modal -->
<div id="new-thread-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideNewThread()">
  <div class="modal">
    <h2>New Conversation</h2>
    <label>Send to</label>
    <select id="new-to"></select>
    <label>Type</label>
    <select id="new-type">
      <option value="prompt">prompt</option>
      <option value="context">context</option>
      <option value="question">question</option>
      <option value="plan">plan</option>
      <option value="handoff">handoff</option>
    </select>
    <label>Content</label>
    <textarea id="new-content" placeholder="Full message..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideNewThread()">Cancel</button>
      <button class="btn-new" onclick="createThread()">Send</button>
    </div>
  </div>
</div>

<div id="agent-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)hideAgentModal()">
  <div class="modal">
    <h2 id="agent-modal-title">Create Agent</h2>
    <div id="agent-error" style="color:#ef4444;font-size:12px;min-height:16px"></div>
    <label>Name</label>
    <input id="agent-name" placeholder="test-worker">
    <div class="modal-group">
      <div class="modal-group-title">Backend</div>
      <label>Provider</label>
      <select id="agent-provider" onchange="handleProviderChange()">
        <option value="anthropic">anthropic</option>
        <option value="openai">openai</option>
        <option value="ollama">ollama</option>
        <option value="google">google</option>
        <option value="codex-cli">codex-cli</option>
      </select>
      <label>Model</label>
      <input id="agent-model" list="agent-model-options" placeholder="model name">
      <datalist id="agent-model-options"></datalist>
      <div id="agent-model-note" class="field-note"></div>
      <div id="agent-api-base-wrap">
        <label>API Base</label>
        <input id="agent-api-base" placeholder="http://localhost:11434">
      </div>
      <div id="agent-credentials-wrap">
        <label>API Key Env</label>
        <select id="agent-credentials-ref">
          <option value="ANTHROPIC_API_KEY">ANTHROPIC_API_KEY</option>
          <option value="OPENAI_API_KEY">OPENAI_API_KEY</option>
          <option value="GOOGLE_API_KEY">GOOGLE_API_KEY</option>
        </select>
        <div id="agent-credentials-note" class="field-note"></div>
      </div>
      <div id="agent-api-key-wrap">
        <label>API Key</label>
        <input id="agent-api-key" type="password" placeholder="sk-...">
        <div id="agent-api-key-status" class="field-note">No key set</div>
      </div>
    </div>
    <div class="modal-group">
      <div class="modal-group-title">Behavior</div>
      <label>Instructions</label>
      <textarea id="agent-instructions" placeholder="You are a worker..."></textarea>
    </div>
    <div class="modal-group">
      <div class="modal-group-title">Execution</div>
      <label>Agent Type</label>
      <select id="agent-agent-type" onchange="handleAgentTypeChange()">
        <option value="worker">worker</option>
        <option value="interactive">interactive</option>
      </select>
      <div id="agent-tools-wrap">
        <label>Tools</label>
        <div class="tools-checkboxes">
          <label><input id="tool-read-file" type="checkbox"> Read Files</label>
          <label><input id="tool-list-directory" type="checkbox"> List Directory</label>
          <label><input id="tool-search-files" type="checkbox"> Search Files</label>
        </div>
      </div>
      <div id="agent-task-types-wrap">
        <label>Task Types</label>
        <input id="agent-task-types" placeholder="prompt,question">
      </div>
      <div id="agent-context-mode-wrap">
        <label>Context</label>
        <select id="agent-context-mode">
          <option value="full_thread">full_thread</option>
          <option value="last_n">last_n</option>
          <option value="task_only">task_only</option>
        </select>
      </div>
      <div class="modal-inline">
        <div>
          <label>Timeout</label>
          <input id="agent-timeout" type="number" value="180">
        </div>
        <div>
          <label>Max Retries</label>
          <input id="agent-max-retries" type="number" value="2">
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="testAgentConnection()">Test Connection</button>
      <button class="btn-cancel" onclick="hideAgentModal()">Cancel</button>
      <button id="agent-save-btn" class="btn-new" onclick="saveAgent()">Create</button>
    </div>
  </div>
</div>

<script src="/static/app.js"></script>
