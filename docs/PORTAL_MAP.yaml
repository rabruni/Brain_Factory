# Mirror entries removed — all handled by hooks/sync_docs.py
# Only narrative (steward-authored) and status pages remain.
#
# ─── Schema ───
#
# Each entry is a dict with these keys:
#
#   sync       REQUIRED  One of: mirror, narrative, status
#   narrative  Path to steward-authored or status page
#
# ─── Constraints ───
#
#   1. sync: narrative or status → narrative REQUIRED
#   2. All declared paths must exist on disk

