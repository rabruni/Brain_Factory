# Portal Map — source-to-surface mapping
# Maintained by: portal-steward
# Validated by: docs/validate_portal_map.py
#
# ─── Schema ───
#
# Each entry is a dict with these keys:
#
#   sync       REQUIRED  One of: mirror, narrative, status
#   source     Path to origin file (relative to repo root)
#   mirror     Path to docs/ copy that tracks source
#   narrative  Path to steward-authored or status page
#
# ─── Constraints ───
#
#   1. Every entry MUST have exactly one of: source, narrative
#   2. source and narrative are mutually exclusive
#   3. sync: mirror  → source REQUIRED; mirror OPTIONAL (absent = portal infra, no docs/ copy)
#   4. sync: narrative or status → narrative REQUIRED; source and mirror FORBIDDEN
#   5. All declared paths must exist on disk
#   6. No key other than source, mirror, narrative, sync is allowed

